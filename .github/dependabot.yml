version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend-runtime:
        patterns:
          - react
          - react-dom
          - vite
          - "@vitejs/*"
      cloudflare:
        patterns:
          - wrangler
          - "@cloudflare/*"
